name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-node

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          MONGO_URI: mongodb://localhost:27017/matgarco_test
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          PAYMOB_API_KEY: test_key
          PAYMOB_SECRET_KEY: test_secret
          PAYMOB_PUBLIC_KEY: test_public
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          QWEN_API_KEY: sk-test
          NODE_ENV: test

  storefront:
    name: Storefront (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storefront-next

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: storefront-next/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
          NEXT_PUBLIC_SITE_URL: http://localhost:3001

  landing:
    name: Landing (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing-next

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-next/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  dashboard:
    name: Dashboard (React Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-react

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard-react/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
